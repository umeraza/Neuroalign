seed: 42
device: auto
output_dir: outputs/tuev

data:
  train_manifest: null
  val_manifest: null
  synthetic: true
  num_samples: 64
  num_classes: 6
  sample_rate: 256
  crop_seconds: 2.0
  long_seconds: 30.0
  overlap: 0.25
  max_channels: 21
  max_time: 512
  num_sensor_types: 4
  use_reports: true

model:
  input_channels: 64
  source_tokens: 16
  d_model: 128
  temporal_stride: 8
  sensor_types: 4
  rvq_codebooks: 4
  rvq_codes: 128
  transformer_layers: 2
  transformer_heads: 4
  dropout: 0.1
  separated_attention: true
  use_sensor_encoder: true
  use_cross_attention: true
  use_rvq: true
  use_rope: true
  text_dim: 384
  projection_dim: 128
  num_classes: 6

loss:
  lambda_freq: 0.25
  lambda_pcc: 0.10
  lambda_rvq: 1.00
  alpha_mtm: 1.00
  beta_mil: 1.00
  gamma_orth: 0.05
  delta_clin: 1.00
  temperature: 0.07
  mask_ratio: 0.40

optim:
  epochs: 1
  batch_size: 4
  lr: 0.0003
  weight_decay: 0.05
  warmup_ratio: 0.10
  grad_clip: 1.0
  mixed_precision: false
  num_workers: 0
